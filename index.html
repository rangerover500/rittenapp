<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ritten Breeland</title>

<link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Ritten">
<meta name="theme-color" content="#ffffff">

<style>

body{
font-family:Arial;
background:#f4f6fb;
margin:0;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
}

button{
padding:10px;
margin:5px;
}

.primary{
background:black;
color:white;
}

.quick button{
margin:4px;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

td,th{
border-bottom:1px solid #ddd;
padding:8px;
}

.active{
background:#eef5ff;
padding:10px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h2>Rittenadministratie</h2>

<label>Datum</label>
<input type="date" id="date">

<label>Tijd</label>
<input type="time" id="time">

<label>Van</label>
<input id="from">

<div class="quick">
<button onclick="setFrom('Breeland R\\'dam')">Breeland R'dam</button>
<button onclick="setFrom('Wasstraat')">Wasstraat</button>
<button onclick="setFrom('ABS den Elzen')">ABS den Elzen</button>
<button onclick="setFrom('Breeland Dordrecht')">Breeland Dordrecht</button>
<button onclick="setFrom('Breeland Den Haag')">Breeland Den Haag</button>
<button onclick="setFrom('Breeland Brielle')">Breeland Brielle</button>
</div>

<label>Naar</label>
<input id="to">

<label>Kenteken</label>
<input id="plate">

<div id="rdw"></div>

<label>Screenshot</label>
<input type="file" id="photo">

<br>

<button class="primary" onclick="saveTrip()">Opslaan</button>
<button onclick="startTrip()">Start rit</button>
<button onclick="stopTrip()">Stop rit</button>
<button onclick="clearForm()">Leegmaken</button>

<div id="activeTrip" class="active" style="display:none"></div>

<h3>Ritten</h3>

<table>
<thead>
<tr>
<th>Datum</th>
<th>Tijd</th>
<th>Van</th>
<th>Naar</th>
<th>Kenteken</th>
<th>Foto</th>
</tr>
</thead>

<tbody id="tripTable"></tbody>
</table>

<button onclick="exportCSV()">Export CSV</button>
<button onclick="wipe()">Alles wissen</button>

</div>

<script>

let trips=JSON.parse(localStorage.getItem("trips")||"[]")
let activeTrip=JSON.parse(localStorage.getItem("activeTrip")||"null")

function pad(n){
return String(n).padStart(2,"0")
}

function today(){
let d=new Date()
return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())
}

function now(){
let d=new Date()
return pad(d.getHours())+":"+pad(d.getMinutes())
}

function setDefaults(){
document.getElementById("date").value=today()
document.getElementById("time").value=now()
}

setDefaults()

function setFrom(v){
document.getElementById("from").value=v
}

async function lookupPlate(){

let plate=document.getElementById("plate").value.toUpperCase()

if(!plate)return

let url="https://opendata.rdw.nl/resource/m9d7-ebf2.json?kenteken="+plate

let res=await fetch(url)

let data=await res.json()

if(data.length){

let r=data[0]

document.getElementById("rdw").innerText=r.merk+" "+r.handelsbenaming

}

}

document.getElementById("plate").addEventListener("input",lookupPlate)

function renderTrips(){

let t=document.getElementById("tripTable")

t.innerHTML=""

trips.forEach((trip,i)=>{

let row=document.createElement("tr")

row.innerHTML=`
<td>${trip.date}</td>
<td>${trip.time}</td>
<td>${trip.from}</td>
<td>${trip.to}</td>
<td>${trip.plate}</td>
<td>${trip.photo?'<img src="'+trip.photo+'" width="60">':''}</td>
`

t.appendChild(row)

})

localStorage.setItem("trips",JSON.stringify(trips))

}

function saveTrip(){

let date=document.getElementById("date").value
let time=document.getElementById("time").value
let from=document.getElementById("from").value
let to=document.getElementById("to").value
let plate=document.getElementById("plate").value.toUpperCase()

let file=document.getElementById("photo").files[0]

if(file){

let reader=new FileReader()

reader.onload=function(){

trips.unshift({date,time,from,to,plate,photo:reader.result})

renderTrips()

}

reader.readAsDataURL(file)

}else{

trips.unshift({date,time,from,to,plate})

renderTrips()

}

}

function startTrip(){

let date=document.getElementById("date").value
let time=document.getElementById("time").value
let from=document.getElementById("from").value
let plate=document.getElementById("plate").value

activeTrip={date,time,from,plate}

localStorage.setItem("activeTrip",JSON.stringify(activeTrip))

renderActive()

}

function stopTrip(){

if(!activeTrip)return

let to=document.getElementById("to").value

trips.unshift({

date:activeTrip.date,
time:activeTrip.time,
from:activeTrip.from,
to:to,
plate:activeTrip.plate

})

localStorage.removeItem("activeTrip")

activeTrip=null

renderTrips()

renderActive()

}

function renderActive(){

let box=document.getElementById("activeTrip")

if(!activeTrip){

box.style.display="none"

return

}

box.style.display="block"

box.innerHTML="Actieve rit: "+activeTrip.from+" → ... ("+activeTrip.plate+")"

}

function exportCSV(){

let csv="Datum;Tijd;Van;Naar;Kenteken\n"

trips.forEach(t=>{

csv+=`${t.date};${t.time};${t.from};${t.to};${t.plate}\n`

})

let blob=new Blob([csv])

let url=URL.createObjectURL(blob)

let a=document.createElement("a")

a.href=url

a.download="ritten.csv"

a.click()

}

function wipe(){

if(confirm("Alles wissen?")){

trips=[]

localStorage.removeItem("trips")

renderTrips()

}

}

function clearForm(){

setDefaults()

document.getElementById("from").value=""

document.getElementById("to").value=""

}

renderTrips()
renderActive()

</script>

</body>
</html>
