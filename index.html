<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ritten Breeland</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
margin:0;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
}

button{
padding:10px;
margin:4px;
}

.primary{
background:black;
color:white;
}

.quick button{
font-size:13px;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

td,th{
border-bottom:1px solid #ddd;
padding:8px;
}

.active{
background:#eef5ff;
padding:10px;
margin-top:10px;
}

.kmtotal{
background:#f0f4ff;
padding:8px;
margin-top:10px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>Rittenadministratie</h2>

<div id="kmToday" class="kmtotal"></div>

<label>Datum</label>
<input type="date" id="date">

<label>Tijd</label>
<input type="time" id="time">

<label>Van</label>
<input id="from">

<div class="quick">

<button onclick="setFrom('Breeland Rdam')">Breeland R'dam</button>
<button onclick="setFrom('Wasstraat')">Wasstraat</button>
<button onclick="setFrom('ABS den Elzen')">ABS den Elzen</button>
<button onclick="setFrom('Breeland Dordrecht')">Breeland Dordrecht</button>
<button onclick="setFrom('Breeland Den Haag')">Breeland Den Haag</button>
<button onclick="setFrom('Breeland Brielle')">Breeland Brielle</button>

</div>

<label>Naar</label>
<input id="to">

<h4>Snelle routes</h4>

<div class="quick">

<button onclick="quickRoute('Breeland Rdam','Wasstraat')">Breeland → Wasstraat</button>
<button onclick="quickRoute('Wasstraat','Breeland Rdam')">Wasstraat → Breeland</button>

<button onclick="quickRoute('Breeland Rdam','ABS den Elzen')">Breeland → ABS</button>
<button onclick="quickRoute('ABS den Elzen','Breeland Rdam')">ABS → Breeland</button>

<button onclick="quickRoute('Breeland Rdam','Breeland Dordrecht')">Breeland → Dordrecht</button>
<button onclick="quickRoute('Breeland Rdam','Breeland Den Haag')">Breeland → Den Haag</button>
<button onclick="quickRoute('Breeland Rdam','Breeland Brielle')">Breeland → Brielle</button>

</div>

<button onclick="swapRoute()">Retour</button>

<label>Kenteken</label>
<input id="plate">

<div id="rdw"></div>

<label>Screenshot</label>
<input type="file" id="photo">

<br>

<button class="primary" onclick="saveTrip()">Opslaan</button>
<button onclick="startTrip()">Start rit</button>
<button onclick="stopTrip()">Stop rit</button>
<button onclick="clearForm()">Leegmaken</button>

<div id="activeTrip" class="active" style="display:none"></div>

<h3>Ritten</h3>

<table>

<thead>
<tr>
<th>Datum</th>
<th>Tijd</th>
<th>Van</th>
<th>Naar</th>
<th>Kenteken</th>
<th>Km</th>
<th>Foto</th>
</tr>
</thead>

<tbody id="tripTable"></tbody>

</table>

<button onclick="exportCSV()">Export CSV</button>
<button onclick="wipe()">Alles wissen</button>

</div>

<script>

let trips=JSON.parse(localStorage.getItem("trips")||"[]")
let activeTrip=JSON.parse(localStorage.getItem("activeTrip")||"null")

function pad(n){return String(n).padStart(2,"0")}

function today(){
let d=new Date()
return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())
}

function now(){
let d=new Date()
return pad(d.getHours())+":"+pad(d.getMinutes())
}

function setDefaults(){
document.getElementById("date").value=today()
document.getElementById("time").value=now()
}

setDefaults()

function setFrom(v){
document.getElementById("from").value=v
}

function quickRoute(from,to){
document.getElementById("from").value=from
document.getElementById("to").value=to
}

function swapRoute(){

let f=document.getElementById("from").value
let t=document.getElementById("to").value

document.getElementById("from").value=t
document.getElementById("to").value=f

}

async function lookupPlate(){

let plate=document.getElementById("plate").value.toUpperCase()

if(!plate)return

let url="https://opendata.rdw.nl/resource/m9d7-ebf2.json?kenteken="+plate

let res=await fetch(url)
let data=await res.json()

if(data.length){

let r=data[0]

document.getElementById("rdw").innerText=r.merk+" "+r.handelsbenaming

}

}

document.getElementById("plate").addEventListener("input",lookupPlate)

function calcKM(from,to){

const routes={

"Breeland Rdam|Wasstraat":6,
"Wasstraat|Breeland Rdam":6,

"Breeland Rdam|ABS den Elzen":22,
"ABS den Elzen|Breeland Rdam":22,

"Breeland Rdam|Breeland Dordrecht":19,
"Breeland Dordrecht|Breeland Rdam":19,

"Breeland Rdam|Breeland Den Haag":27,
"Breeland Den Haag|Breeland Rdam":27,

"Breeland Rdam|Breeland Brielle":32,
"Breeland Brielle|Breeland Rdam":32

}

let key=from+"|"+to

return routes[key]||0

}

function renderTrips(){

let t=document.getElementById("tripTable")

t.innerHTML=""

let todayKM=0

trips.forEach(trip=>{

if(trip.date===today()) todayKM+=trip.km||0

let row=document.createElement("tr")

row.innerHTML=`
<td>${trip.date}</td>
<td>${trip.time}</td>
<td>${trip.from}</td>
<td>${trip.to}</td>
<td>${trip.plate}</td>
<td>${trip.km||""}</td>
<td>${trip.photo?'<img src="'+trip.photo+'" width="60">':''}</td>
`

t.appendChild(row)

})

document.getElementById("kmToday").innerText="Vandaag gereden: "+todayKM+" km"

localStorage.setItem("trips",JSON.stringify(trips))

}

function saveTrip(){

let date=document.getElementById("date").value
let time=document.getElementById("time").value
let from=document.getElementById("from").value
let to=document.getElementById("to").value
let plate=document.getElementById("plate").value.toUpperCase()

let km=calcKM(from,to)

let file=document.getElementById("photo").files[0]

if(file){

let reader=new FileReader()

reader.onload=function(){

trips.unshift({date,time,from,to,plate,km,photo:reader.result})

renderTrips()

}

reader.readAsDataURL(file)

}else{

trips.unshift({date,time,from,to,plate,km})

renderTrips()

}

}

function startTrip(){

let date=document.getElementById("date").value
let time=document.getElementById("time").value
let from=document.getElementById("from").value
let plate=document.getElementById("plate").value

activeTrip={date,time,from,plate}

localStorage.setItem("activeTrip",JSON.stringify(activeTrip))

renderActive()

}

function stopTrip(){

if(!activeTrip)return

let to=document.getElementById("to").value

let km=calcKM(activeTrip.from,to)

trips.unshift({
date:activeTrip.date,
time:activeTrip.time,
from:activeTrip.from,
to:to,
plate:activeTrip.plate,
km:km
})

localStorage.removeItem("activeTrip")

activeTrip=null

renderTrips()

renderActive()

}

function renderActive(){

let box=document.getElementById("activeTrip")

if(!activeTrip){

box.style.display="none"
return

}

box.style.display="block"

box.innerHTML="Actieve rit: "+activeTrip.from+" → ... ("+activeTrip.plate+")"

}

function exportCSV(){

let csv="Datum;Tijd;Van;Naar;Kenteken;Km\n"

trips.forEach(t=>{

csv+=`${t.date};${t.time};${t.from};${t.to};${t.plate};${t.km}\n`

})

let blob=new Blob([csv])

let url=URL.createObjectURL(blob)

let a=document.createElement("a")

a.href=url
a.download="ritten.csv"

a.click()

}

function wipe(){

if(confirm("Alles wissen?")){

trips=[]

localStorage.removeItem("trips")

renderTrips()

}

}

function clearForm(){

setDefaults()

document.getElementById("from").value=""
document.getElementById("to").value=""

}

renderTrips()
renderActive()

</script>

</body>
</html>
