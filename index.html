<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ritten Breeland</title>

<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Ritten">
<meta name="theme-color" content="#ffffff">

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

<style>
body{
  font-family: Arial, sans-serif;
  background: #f4f6fb;
  margin: 0;
  padding: 20px;
}
.container{
  max-width: 1100px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
}
input{
  background: #eaffea;
  padding: 10px;
  margin-bottom: 8px;
  border-radius: 6px;
  border: 1px solid #ccd;
  width: 100%;
  box-sizing: border-box;
  font-size: 16px;
}
button{
  padding: 10px 12px;
  margin: 4px;
  border: none;
  border-radius: 6px;
  font-size: 15px;
  cursor: pointer;
}
.primary{ background: black; color: white; }
.voice{ background: #007bff; color: white; }

.quick button,
.plates button{
  font-size: 13px;
  background: #f2f2f2;
  color: #111;
  border: 1px solid #ddd;
}

table{
  width: 100%;
  margin-top: 20px;
  border-collapse: collapse;
}
td, th{
  border-bottom: 1px solid #ddd;
  padding: 8px;
  text-align: left;
  vertical-align: top;
}
.daybox{
  background: #f0f4ff;
  padding: 10px;
  margin-bottom: 12px;
  border-radius: 6px;
}
#rdw{
  margin: 8px 0 6px 0;
  font-size: 14px;
  color: #333;
  min-height: 20px;
}
.note{
  font-size: 13px;
  color: #666;
  margin-top: -4px;
  margin-bottom: 8px;
}
.warning{
  color: #b00020;
  font-weight: bold;
}
.row2{
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
@media (max-width:700px){
  .row2{ grid-template-columns: 1fr; }
}
.small-muted{
  color:#666;
  font-size:13px;
}
</style>
</head>

<body>
<div class="container">

<h2>Rittenadministratie</h2>

<div class="daybox">
  <h3 style="margin-top:0;">Werkdag</h3>
  <div class="row2">
    <div>
      <label>Aanwezig vanaf</label>
      <input type="time" id="workStart">
    </div>
    <div>
      <label>Klaar om</label>
      <input type="time" id="workEnd">
    </div>
  </div>
  <div id="dayHoursInfo" style="font-weight:bold; margin-top:8px;">
    Totaal gewerkte uren vandaag: 0 uur en 0 minuten
  </div>
</div>

<label>Datum</label>
<input type="date" id="date">

<div class="row2">
  <div>
    <label>Starttijd rit</label>
    <input type="time" id="timeStart">
  </div>
  <div>
    <label>Eindtijd rit</label>
    <input type="time" id="timeEnd">
  </div>
</div>

<label>Van</label>
<input id="from">

<div class="quick">
  <button type="button" onclick="setFrom('Breeland Rotterdam')">Breeland Rotterdam</button>
  <button type="button" onclick="setFrom('Wasstraat')">Wasstraat</button>
  <button type="button" onclick="setFrom('ABS Den Elzen')">ABS Den Elzen</button>
  <button type="button" onclick="setFrom('Breeland Dordrecht')">Breeland Dordrecht</button>
  <button type="button" onclick="setFrom('Breeland Den Haag')">Breeland Den Haag</button>
  <button type="button" onclick="setFrom('Breeland Brielle')">Breeland Brielle</button>
</div>

<label>Naar</label>
<input id="to">

<div class="quick">
  <button type="button" onclick="setTo('Breeland Rotterdam')">Breeland Rotterdam</button>
  <button type="button" onclick="setTo('Wasstraat')">Wasstraat</button>
  <button type="button" onclick="setTo('ABS Den Elzen')">ABS Den Elzen</button>
  <button type="button" onclick="setTo('Breeland Dordrecht')">Breeland Dordrecht</button>
  <button type="button" onclick="setTo('Breeland Den Haag')">Breeland Den Haag</button>
  <button type="button" onclick="setTo('Breeland Brielle')">Breeland Brielle</button>
</div>

<button type="button" onclick="swapRoute()">Retour</button>

<label>Tussenstop(s)</label>
<input id="stops" placeholder="Bijv. Wasstraat, ABS Den Elzen, Breeland Dordrecht">

<div class="quick">
  <button type="button" onclick="addStop('Breeland Rotterdam')">Breeland Rotterdam</button>
  <button type="button" onclick="addStop('Wasstraat')">Wasstraat</button>
  <button type="button" onclick="addStop('ABS Den Elzen')">ABS Den Elzen</button>
  <button type="button" onclick="addStop('Breeland Dordrecht')">Breeland Dordrecht</button>
  <button type="button" onclick="addStop('Breeland Den Haag')">Breeland Den Haag</button>
  <button type="button" onclick="addStop('Breeland Brielle')">Breeland Brielle</button>
</div>

<div class="note">Meerdere tussenstops worden automatisch met komma’s toegevoegd.</div>

<label>Spraak invoer</label>
<button class="voice" type="button" onclick="startVoice()">🎤 Spreek route</button>
<div class="note">Zeg bijvoorbeeld: “Breeland Rotterdam naar Wasstraat”.</div>

<label>Kenteken</label>
<input id="plate" placeholder="Bijv. X-605-VJ" oninput="this.value=this.value.toUpperCase()">

<div class="plates" id="plateList"></div>

<div id="rdw"></div>
<div id="rdwPrice" class="small-muted"></div>

<div id="odoWarning" class="warning" style="display:none; margin-bottom:8px;">
  Let op: km-stand invullen!
</div>

<label>Km-stand na rit</label>
<input id="odometer" type="number" inputmode="numeric" placeholder="Bijv. 123456">

<div>
  <button class="primary" type="button" onclick="saveTrip()">Opslaan</button>
  <button type="button" onclick="saveRoute()">Route met tussenstops opslaan</button>
  <button type="button" onclick="clearForm()">Leegmaken</button>
</div>

<h3>Ritten</h3>

<table>
  <thead>
    <tr>
      <th>Datum</th>
      <th>Start</th>
      <th>Eind</th>
      <th>Van</th>
      <th>Naar</th>
      <th>Kenteken</th>
      <th>Auto</th>
      <th>Km-stand</th>
    </tr>
  </thead>
  <tbody id="tripTable"></tbody>
</table>

<button type="button" onclick="exportExcel()">Export Excel</button>
<button type="button" onclick="wipe()">Alles wissen</button>

</div>

<script>
const mandatoryOdoPlates = ["X-605-VJ", "Z-406-BG"];

const $ = (id) => document.getElementById(id);

const dateEl = $("date");
const timeStartEl = $("timeStart");
const timeEndEl = $("timeEnd");
const fromEl = $("from");
const toEl = $("to");
const stopsEl = $("stops");
const plateEl = $("plate");
const plateListEl = $("plateList");
const rdwEl = $("rdw");
const rdwPriceEl = $("rdwPrice");
const odometerEl = $("odometer");
const odoWarningEl = $("odoWarning");
const tripTableEl = $("tripTable");
const workStartEl = $("workStart");
const workEndEl = $("workEnd");
const dayHoursInfoEl = $("dayHoursInfo");

let trips = JSON.parse(localStorage.getItem("trips_v12") || "[]");
let plates = JSON.parse(localStorage.getItem("plates_v12") || "[]");
let dayData = JSON.parse(localStorage.getItem("dayData_v12") || "{}");

function pad(n){
  return String(n).padStart(2, "0");
}

function today(){
  const d = new Date();
  return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate());
}

function now(){
  const d = new Date();
  return pad(d.getHours()) + ":" + pad(d.getMinutes());
}

function normalizeLocation(text){
  let t = String(text || "").trim().toLowerCase();

  if ((t.includes("breeland") && t.includes("rotterdam")) || t === "breeland rotterdam" || t === "breeland rdam") return "Breeland Rotterdam";
  if (t.includes("breeland") && t.includes("dordrecht")) return "Breeland Dordrecht";
  if (t.includes("breeland") && t.includes("den haag")) return "Breeland Den Haag";
  if (t.includes("breeland") && t.includes("brielle")) return "Breeland Brielle";
  if (t.includes("wasstraat")) return "Wasstraat";
  if (t.includes("abs") || t.includes("den elzen")) return "ABS Den Elzen";

  return String(text || "").trim();
}

function normalizePlate(p){
  return String(p || "").toUpperCase().trim();
}

function normalizePlateForCompare(p){
  return normalizePlate(p).replace(/[^A-Z0-9]/g, "");
}

function isLikelyCompletePlate(p){
  const cleaned = normalizePlateForCompare(p);
  return cleaned.length >= 6;
}

function cleanVehicleText(value){
  return String(value || "")
    .replace(/\s+/g, " ")
    .trim();
}

function uniqueParts(parts){
  const out = [];
  const seen = new Set();

  parts.forEach(part => {
    const p = cleanVehicleText(part);
    if(!p) return;
    const key = p.toLowerCase();
    if(seen.has(key)) return;
    seen.add(key);
    out.push(p);
  });

  return out;
}

function extractYearFromDateString(value){
  const s = String(value || "").trim();
  if(!s) return "";

  const match = s.match(/^(\d{4})/);
  if(match) return match[1];

  if(/^\d{8}$/.test(s)){
    return s.slice(0, 4);
  }

  return "";
}

function formatPrice(value){
  const n = Number(value);
  if(!Number.isFinite(n) || n <= 0) return "";
  return new Intl.NumberFormat("nl-NL", {
    style: "currency",
    currency: "EUR",
    maximumFractionDigits: 0
  }).format(n);
}

function buildVehicleDescription(d){
  const merk = cleanVehicleText(d.merk);
  const handelsbenaming = cleanVehicleText(d.handelsbenaming);
  const type = cleanVehicleText(d.type);
  const variant = cleanVehicleText(d.variant);
  const uitvoering = cleanVehicleText(d.uitvoering || d.inrichting);
  const commercial = cleanVehicleText(d.commerci_le_benaming || d.commerciele_benaming);
  const voertuigsoort = cleanVehicleText(d.voertuigsoort);
  const jaar =
    extractYearFromDateString(d.datum_eerste_toelating) ||
    extractYearFromDateString(d.datum_tenaamstelling);

  let parts = [];

  if (merk && merk.toLowerCase() === "lr") {
    parts.push("Land Rover");
  } else {
    parts.push(merk);
  }

  parts.push(handelsbenaming);

  if (commercial && handelsbenaming && !handelsbenaming.toLowerCase().includes(commercial.toLowerCase())) {
    parts.push(commercial);
  }

  if (type && handelsbenaming && !handelsbenaming.toLowerCase().includes(type.toLowerCase())) {
    parts.push(type);
  } else if (type && !handelsbenaming) {
    parts.push(type);
  }

  if (variant && handelsbenaming && !handelsbenaming.toLowerCase().includes(variant.toLowerCase())) {
    parts.push(variant);
  } else if (variant && !handelsbenaming) {
    parts.push(variant);
  }

  if (uitvoering) {
    const lowerJoined = parts.join(" ").toLowerCase();
    if (!lowerJoined.includes(uitvoering.toLowerCase())) {
      parts.push(uitvoering);
    }
  }

  parts = uniqueParts(parts);

  let result = parts.join(" ").replace(/\s+/g, " ").trim();

  if (!result && voertuigsoort) {
    result = voertuigsoort;
  }

  if (jaar) {
    result += " (" + jaar + ")";
  }

  return result || "Voertuig niet gevonden";
}

function isMandatoryOdoPlate(p){
  const cleaned = normalizePlateForCompare(p);
  return mandatoryOdoPlates
    .map(normalizePlateForCompare)
    .includes(cleaned);
}

function updateOdoRequirement(){
  const p = normalizePlate(plateEl.value);
  odoWarningEl.style.display = isMandatoryOdoPlate(p) ? "block" : "none";
}

function setDefaults(){
  dateEl.value = today();
  timeStartEl.value = now();
  timeEndEl.value = now();

  const d = today();
  workStartEl.value = (dayData[d] && dayData[d].workStart) || "";
  workEndEl.value = (dayData[d] && dayData[d].workEnd) || "";
  updateDayHours();
}

function setFrom(v){
  fromEl.value = v;
}

function setTo(v){
  toEl.value = v;
}

function addStop(v){
  const current = stopsEl.value.trim();

  if(!current){
    stopsEl.value = v;
    return;
  }

  const parts = current.split(",").map(x => x.trim()).filter(Boolean);
  if(parts.includes(v)) return;

  stopsEl.value = current + ", " + v;
}

function swapRoute(){
  const f = normalizeLocation(fromEl.value);
  const t = normalizeLocation(toEl.value);
  fromEl.value = t;
  toEl.value = f;
}

function startVoice(){
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SpeechRecognition){
    alert("Spraak niet ondersteund op dit apparaat.");
    return;
  }

  const rec = new SpeechRecognition();
  rec.lang = "nl-NL";
  rec.start();

  rec.onresult = function(e){
    const text = e.results[0][0].transcript.toLowerCase();
    if(text.includes("naar")){
      const parts = text.split("naar");
      fromEl.value = normalizeLocation(parts[0]);
      toEl.value = normalizeLocation(parts[1]);
    } else {
      alert("Zeg bijvoorbeeld: 'Breeland Rotterdam naar Wasstraat'");
    }
  };
}

function timeDiffMinutes(start, end){
  if(!start || !end) return 0;

  const [sh, sm] = start.split(":").map(Number);
  const [eh, em] = end.split(":").map(Number);

  const startMin = sh * 60 + sm;
  const endMin = eh * 60 + em;

  let diff = endMin - startMin;
  if(diff < 0) diff = 0;

  return diff;
}

function formatMinutesDutch(totalMinutes){
  const h = Math.floor(totalMinutes / 60);
  const m = totalMinutes % 60;
  return h + " uur en " + m + " minuten";
}

function updateDayHours(){
  const d = dateEl.value || today();

  dayData[d] = {
    workStart: workStartEl.value || "",
    workEnd: workEndEl.value || ""
  };

  localStorage.setItem("dayData_v12", JSON.stringify(dayData));

  const minutes = timeDiffMinutes(workStartEl.value, workEndEl.value);
  dayHoursInfoEl.innerText = "Totaal gewerkte uren vandaag: " + formatMinutesDutch(minutes);
}

workStartEl.addEventListener("input", updateDayHours);
workEndEl.addEventListener("input", updateDayHours);
dateEl.addEventListener("input", () => {
  const d = dateEl.value || today();
  workStartEl.value = (dayData[d] && dayData[d].workStart) || "";
  workEndEl.value = (dayData[d] && dayData[d].workEnd) || "";
  updateDayHours();
});

function savePlate(p){
  p = normalizePlate(p);
  if(!p || !isLikelyCompletePlate(p)) return;

  plates = plates.filter(x => normalizePlateForCompare(x) !== normalizePlateForCompare(p));
  plates.unshift(p);
  plates = plates.slice(0, 10);

  localStorage.setItem("plates_v12", JSON.stringify(plates));
  renderPlates();
}

function renderPlates(){
  plateListEl.innerHTML = "";

  plates.forEach(p => {
    const b = document.createElement("button");
    b.type = "button";
    b.innerText = p;
    b.onclick = function(){
      plateEl.value = p;
      lookupPlate();
      updateOdoRequirement();
    };
    plateListEl.appendChild(b);
  });
}

async function lookupPlate(){
  const p = normalizePlate(plateEl.value);
  plateEl.value = p;
  updateOdoRequirement();

  if(!p){
    rdwEl.innerText = "";
    rdwPriceEl.innerText = "";
    return { vehicleText: "", priceText: "" };
  }

  try{
    const url = "https://opendata.rdw.nl/resource/m9d7-ebf2.json?kenteken=" + encodeURIComponent(normalizePlateForCompare(p));
    const r = await fetch(url);
    const d = await r.json();

    if(d.length){
      const row = d[0];
      const vehicleText = buildVehicleDescription(row);

      let priceText = "";
      const rawPrice =
        row.catalogusprijs ||
        row.catalogusprijs_inclusief_bpm ||
        row.nieuwprijs ||
        row.bruto_bpm;

      const formattedPrice = formatPrice(rawPrice);
      if(formattedPrice){
        priceText = "Nieuwprijs: " + formattedPrice;
      }

      rdwEl.innerText = vehicleText;
      rdwPriceEl.innerText = priceText;

      return { vehicleText, priceText };
    }

    rdwEl.innerText = "Geen voertuiggegevens gevonden";
    rdwPriceEl.innerText = "";
    return { vehicleText: "", priceText: "" };
  } catch(e){
    rdwEl.innerText = "RDW-gegevens konden niet worden opgehaald";
    rdwPriceEl.innerText = "";
    return { vehicleText: "", priceText: "" };
  }
}

plateEl.addEventListener("input", lookupPlate);

function escapeHtml(value){
  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function renderTrips(){
  tripTableEl.innerHTML = "";

  trips.forEach(t => {
    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${escapeHtml(t.date || "")}</td>
      <td>${escapeHtml(t.timeStart || "")}</td>
      <td>${escapeHtml(t.timeEnd || "")}</td>
      <td>${escapeHtml(t.from || "")}</td>
      <td>${escapeHtml(t.to || "")}</td>
      <td>${escapeHtml(t.plate || "")}</td>
      <td>${escapeHtml(t.vehicle || "")}</td>
      <td>${escapeHtml(t.odometer || "")}</td>
    `;
    tripTableEl.appendChild(row);
  });
}

function buildTripObject(fromValue, toValue, vehicleText){
  const d = dateEl.value || today();
  const p = normalizePlate(plateEl.value);
  const fromVal = normalizeLocation(fromValue);
  const toVal = normalizeLocation(toValue);
  const ts = timeStartEl.value;
  const te = timeEndEl.value;
  const odo = odometerEl.value.trim();
  const workMinutes = timeDiffMinutes(workStartEl.value, workEndEl.value);

  return {
    date: d,
    timeStart: ts,
    timeEnd: te,
    from: fromVal,
    to: toVal,
    plate: p,
    vehicle: vehicleText || rdwEl.innerText || "",
    odometer: odo,
    workStart: workStartEl.value || "",
    workEnd: workEndEl.value || "",
    workHours: formatMinutesDutch(workMinutes)
  };
}

function validateTrip(trip){
  if(!trip.date || !trip.timeStart || !trip.timeEnd || !trip.from || !trip.to || !trip.plate){
    alert("Vul datum, starttijd, eindtijd, van, naar en kenteken in.");
    return false;
  }

  return true;
}

async function saveTrip(){
  const info = await lookupPlate();
  const trip = buildTripObject(fromEl.value, toEl.value, info.vehicleText);

  if(!validateTrip(trip)) return;

  savePlate(trip.plate);
  trips.unshift(trip);
  localStorage.setItem("trips_v12", JSON.stringify(trips));

  renderTrips();
  clearForm();
}

async function saveRoute(){
  const p = normalizePlate(plateEl.value);
  const rawStops = stopsEl.value.trim();

  if(!dateEl.value || !timeStartEl.value || !timeEndEl.value || !fromEl.value || !toEl.value || !p){
    alert("Vul datum, starttijd, eindtijd, van, naar en kenteken in.");
    return;
  }

  const info = await lookupPlate();

  const stopList = rawStops
    ? rawStops.split(",").map(s => normalizeLocation(s.trim())).filter(Boolean)
    : [];

  const points = [
    normalizeLocation(fromEl.value),
    ...stopList,
    normalizeLocation(toEl.value)
  ];

  if(points.length < 2){
    alert("Te weinig routepunten.");
    return;
  }

  savePlate(p);

  const newTrips = [];
  for(let i = 0; i < points.length - 1; i++){
    const trip = buildTripObject(points[i], points[i + 1], info.vehicleText);
    if(!validateTrip(trip)) return;
    newTrips.push(trip);
  }

  trips = [...newTrips.reverse(), ...trips];
  localStorage.setItem("trips_v12", JSON.stringify(trips));

  renderTrips();
  clearForm();
}

function calcExcelColumnWidths(rows){
  if(!rows.length) return [];

  const colCount = Math.max(...rows.map(r => r.length));
  const widths = [];

  for(let c = 0; c < colCount; c++){
    let maxLen = 10;

    for(let r = 0; r < rows.length; r++){
      const cell = rows[r][c] == null ? "" : String(rows[r][c]);
      maxLen = Math.max(maxLen, cell.length);
    }

    widths.push({ wch: Math.min(maxLen + 2, 60) });
  }

  return widths;
}

function exportExcel(){
  const rows = [
    ["Datum", "Starttijd", "Eindtijd", "Van", "Naar", "Kenteken", "Auto", "Km-stand"],
    ...trips.map(t => [
      t.date || "",
      t.timeStart || "",
      t.timeEnd || "",
      t.from || "",
      t.to || "",
      t.plate || "",
      t.vehicle || "",
      t.odometer || ""
    ])
  ];

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(rows);

  ws["!cols"] = calcExcelColumnWidths(rows);

  XLSX.utils.book_append_sheet(wb, ws, "Ritten");

  const nowDate = new Date();
  const filename =
    "ritten_" +
    nowDate.getFullYear() + "-" +
    pad(nowDate.getMonth()+1) + "-" +
    pad(nowDate.getDate()) + "_" +
    pad(nowDate.getHours()) + "-" +
    pad(nowDate.getMinutes()) +
    ".xlsx";

  XLSX.writeFile(wb, filename);
}

function wipe(){
  if(confirm("Alles wissen? Dit verwijdert ritten, kentekens en werkdaggegevens.")){
    trips = [];
    plates = [];
    dayData = {};

    localStorage.removeItem("trips_v12");
    localStorage.removeItem("plates_v12");
    localStorage.removeItem("dayData_v12");

    renderTrips();
    renderPlates();
    setDefaults();
    clearForm();
  }
}

function clearForm(){
  const d = dateEl.value || today();
  dateEl.value = d;
  timeStartEl.value = now();
  timeEndEl.value = now();
  fromEl.value = "";
  toEl.value = "";
  stopsEl.value = "";
  odometerEl.value = "";
  rdwEl.innerText = "";
  rdwPriceEl.innerText = "";
  updateOdoRequirement();
}

setDefaults();
renderTrips();
renderPlates();
updateOdoRequirement();
</script>

</body>
</html>
