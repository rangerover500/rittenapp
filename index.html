<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ritten Breeland</title>

<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Ritten">
<meta name="theme-color" content="#ffffff">

<style>
body{
  font-family:Arial, sans-serif;
  background:#f4f6fb;
  margin:0;
  padding:20px;
}
.container{
  max-width:950px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:10px;
}
input{
  background:#eaffea;
  padding:10px;
  margin-bottom:8px;
  border-radius:6px;
  border:1px solid #ccd;
  width:100%;
  box-sizing:border-box;
  font-size:16px;
}
button{
  padding:10px 12px;
  margin:4px;
  border:none;
  border-radius:6px;
  font-size:15px;
}
.primary{
  background:black;
  color:white;
}
.start{
  background:#28a745;
  color:white;
}
.stop{
  background:#d9534f;
  color:white;
}
.quick button,
.plates button{
  font-size:13px;
  background:#f2f2f2;
  color:#111;
  border:1px solid #ddd;
}
table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}
td,th{
  border-bottom:1px solid #ddd;
  padding:8px;
  text-align:left;
  vertical-align:top;
}
.active{
  background:#eef5ff;
  padding:10px;
  margin-top:10px;
  border-radius:6px;
}
.daybox{
  background:#f0f4ff;
  padding:10px;
  margin-bottom:12px;
  border-radius:6px;
}
#rdw{
  margin:8px 0 12px 0;
  font-size:14px;
  color:#333;
  min-height:20px;
}
.thumb{
  width:70px;
  height:auto;
  border-radius:6px;
  border:1px solid #ddd;
}
.note{
  font-size:13px;
  color:#666;
  margin-top:-4px;
  margin-bottom:8px;
}
.warning{
  color:#b00020;
  font-weight:bold;
}
.row2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>Rittenadministratie</h2>

<div class="daybox">
  <h3 style="margin-top:0;">Werkdag</h3>

  <div class="row2">
    <div>
      <label>Aanwezig vanaf</label>
      <input type="time" id="workStart">
    </div>
    <div>
      <label>Klaar om</label>
      <input type="time" id="workEnd">
    </div>
  </div>

  <div id="dayHoursInfo" style="font-weight:bold; margin-top:8px;">Totaal gewerkte uren vandaag: 0,00</div>
</div>

<label>Datum</label>
<input type="date" id="date">

<div class="row2">
  <div>
    <label>Starttijd rit</label>
    <input type="time" id="timeStart">
  </div>
  <div>
    <label>Eindtijd rit</label>
    <input type="time" id="timeEnd">
  </div>
</div>

<label>Van</label>
<input id="from">

<div class="quick">
  <button onclick="setFrom('Breeland Rdam')">Breeland R'dam</button>
  <button onclick="setFrom('Wasstraat')">Wasstraat</button>
  <button onclick="setFrom('ABS den Elzen')">ABS den Elzen</button>
  <button onclick="setFrom('Breeland Dordrecht')">Breeland Dordrecht</button>
  <button onclick="setFrom('Breeland Den Haag')">Breeland Den Haag</button>
  <button onclick="setFrom('Breeland Brielle')">Breeland Brielle</button>
</div>

<label>Naar</label>
<input id="to">

<div class="quick">
  <button onclick="setTo('Breeland Rdam')">Breeland R'dam</button>
  <button onclick="setTo('Wasstraat')">Wasstraat</button>
  <button onclick="setTo('ABS den Elzen')">ABS den Elzen</button>
  <button onclick="setTo('Breeland Dordrecht')">Breeland Dordrecht</button>
  <button onclick="setTo('Breeland Den Haag')">Breeland Den Haag</button>
  <button onclick="setTo('Breeland Brielle')">Breeland Brielle</button>
</div>

<button onclick="swapRoute()">Retour</button>

<label>Kenteken</label>
<input id="plate" placeholder="Bijv. AB-123-C">

<div class="plates" id="plateList"></div>

<div id="rdw"></div>

<label>Kentekenfoto / thumbnail</label>
<input type="file" id="photo" accept="image/*" capture="environment">
<div class="note">Tik hierop om direct een foto van het kenteken te maken of een foto te kiezen.</div>

<label id="odoLabel">Km-stand na rit (alleen verplicht voor bepaalde auto's)</label>
<input id="odometer" type="number" inputmode="numeric" placeholder="Bijv. 123456">

<div id="odoWarning" class="warning" style="display:none;">
  Voor dit kenteken is km-stand invullen verplicht.
</div>

<div>
  <button class="primary" onclick="saveTrip()">Opslaan</button>
  <button class="start" onclick="startTrip()">Start rit</button>
  <button class="stop" onclick="stopTrip()">Stop rit</button>
  <button onclick="clearForm()">Leegmaken</button>
</div>

<div id="activeTripBox" class="active" style="display:none;"></div>

<h3>Ritten</h3>

<table>
  <thead>
    <tr>
      <th>Datum</th>
      <th>Start</th>
      <th>Eind</th>
      <th>Van</th>
      <th>Naar</th>
      <th>Kenteken</th>
      <th>Km route</th>
      <th>Km-stand</th>
      <th>Foto</th>
    </tr>
  </thead>
  <tbody id="tripTable"></tbody>
</table>

<button onclick="exportCSV()">Export CSV</button>
<button onclick="wipe()">Alles wissen</button>

</div>

<script>
const locationCoords = {
  "Breeland Rdam": [51.9225, 4.47917],
  "Wasstraat": [51.9150, 4.4800],
  "ABS den Elzen": [51.8765, 4.3580],
  "Breeland Dordrecht": [51.8133, 4.6901],
  "Breeland Den Haag": [52.0705, 4.3007],
  "Breeland Brielle": [51.9033, 4.1625]
};

// VERVANG DEZE 2 KENTEKENS DOOR JOUW ECHTE KENTEKENS
const mandatoryOdoPlates = ["AB-123-C", "XY-456-Z"];

let trips = JSON.parse(localStorage.getItem("trips_v2") || "[]");
let activeTrip = JSON.parse(localStorage.getItem("activeTrip_v2") || "null");
let plates = JSON.parse(localStorage.getItem("plates_v2") || "[]");
let dayData = JSON.parse(localStorage.getItem("dayData_v2") || "{}");

function pad(n){
  return String(n).padStart(2,"0");
}

function today(){
  const d = new Date();
  return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
}

function now(){
  const d = new Date();
  return pad(d.getHours())+":"+pad(d.getMinutes());
}

function normalizeLocation(text){
  let t = String(text || "").trim().toLowerCase();

  if ((t.includes("breeland") && (t.includes("rdam") || t.includes("rotterdam"))) || t === "breeland rdam") return "Breeland Rdam";
  if (t.includes("breeland") && t.includes("dordrecht")) return "Breeland Dordrecht";
  if (t.includes("breeland") && t.includes("den haag")) return "Breeland Den Haag";
  if (t.includes("breeland") && t.includes("brielle")) return "Breeland Brielle";
  if (t.includes("wasstraat")) return "Wasstraat";
  if (t.includes("abs") || t.includes("den elzen")) return "ABS den Elzen";

  return text;
}

function normalizePlate(p){
  return String(p || "").toUpperCase().trim();
}

function setDefaults(){
  date.value = today();
  timeStart.value = now();
  timeEnd.value = now();

  if(dayData[today()]){
    workStart.value = dayData[today()].workStart || "";
    workEnd.value = dayData[today()].workEnd || "";
  }
  updateDayHours();
}

function setFrom(v){
  from.value = v;
}

function setTo(v){
  to.value = v;
}

function swapRoute(){
  const f = normalizeLocation(from.value);
  const t = normalizeLocation(to.value);
  from.value = t;
  to.value = f;
}

function toRad(v){
  return v * Math.PI / 180;
}

function calcKM(fromText, toText){
  const fromName = normalizeLocation(fromText);
  const toName = normalizeLocation(toText);

  if(!locationCoords[fromName] || !locationCoords[toName]) return 0;

  const [lat1, lon1] = locationCoords[fromName];
  const [lat2, lon2] = locationCoords[toName];

  const R = 6371;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);

  const a =
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
    Math.sin(dLon/2) * Math.sin(dLon/2);

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return Math.round(R * c);
}

function timeDiffHours(start, end){
  if(!start || !end) return 0;

  const [sh, sm] = start.split(":").map(Number);
  const [eh, em] = end.split(":").map(Number);

  const startMin = sh * 60 + sm;
  const endMin = eh * 60 + em;

  let diff = endMin - startMin;
  if(diff < 0) diff = 0;

  return diff / 60;
}

function updateDayHours(){
  const d = date.value || today();
  const ws = workStart.value || "";
  const we = workEnd.value || "";

  dayData[d] = {
    workStart: ws,
    workEnd: we
  };
  localStorage.setItem("dayData_v2", JSON.stringify(dayData));

  const hours = timeDiffHours(ws, we);
  dayHoursInfo.innerText = "Totaal gewerkte uren vandaag: " + hours.toFixed(2).replace(".", ",");
}

workStart.addEventListener("input", updateDayHours);
workEnd.addEventListener("input", updateDayHours);
date.addEventListener("input", () => {
  const d = date.value || today();
  workStart.value = (dayData[d] && dayData[d].workStart) || "";
  workEnd.value = (dayData[d] && dayData[d].workEnd) || "";
  updateDayHours();
});

function isMandatoryOdoPlate(p){
  return mandatoryOdoPlates.includes(normalizePlate(p));
}

function updateOdoRequirement(){
  const p = normalizePlate(plate.value);
  const required = isMandatoryOdoPlate(p);
  odoWarning.style.display = required ? "block" : "none";
}

function savePlate(p){
  p = normalizePlate(p);
  if(!p) return;

  plates = plates.filter(x => x !== p);
  plates.unshift(p);
  plates = plates.slice(0, 10);

  localStorage.setItem("plates_v2", JSON.stringify(plates));
  renderPlates();
}

function renderPlates(){
  plateList.innerHTML = "";

  plates.forEach(p => {
    const b = document.createElement("button");
    b.type = "button";
    b.innerText = p;
    b.onclick = function(){
      plate.value = p;
      lookupPlate();
      updateOdoRequirement();
    };
    plateList.appendChild(b);
  });
}

async function lookupPlate(){
  const p = normalizePlate(plate.value);
  plate.value = p;
  updateOdoRequirement();

  if(!p){
    rdw.innerText = "";
    return;
  }

  savePlate(p);

  try{
    const url = "https://opendata.rdw.nl/resource/m9d7-ebf2.json?kenteken=" + encodeURIComponent(p);
    const r = await fetch(url);
    const d = await r.json();

    if(d.length){
      rdw.innerText = (d[0].merk || "") + " " + (d[0].handelsbenaming || "");
    } else {
      rdw.innerText = "";
    }
  } catch(e){
    rdw.innerText = "";
  }
}

plate.addEventListener("input", lookupPlate);

function renderTrips(){
  tripTable.innerHTML = "";

  trips.forEach(t => {
    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${t.date || ""}</td>
      <td>${t.timeStart || ""}</td>
      <td>${t.timeEnd || ""}</td>
      <td>${t.from || ""}</td>
      <td>${t.to || ""}</td>
      <td>${t.plate || ""}</td>
      <td>${t.km || ""}</td>
      <td>${t.odometer || ""}</td>
      <td>${t.photo ? `<img class="thumb" src="${t.photo}" alt="kentekenfoto">` : ""}</td>
    `;
    tripTable.appendChild(row);
  });
}

function renderActive(){
  if(!activeTrip){
    activeTripBox.style.display = "none";
    activeTripBox.innerHTML = "";
    return;
  }

  activeTripBox.style.display = "block";
  activeTripBox.innerHTML =
    "Actieve rit: " + (activeTrip.from || "") +
    " → ... (" + (activeTrip.plate || "") + ")" +
    "<br>Starttijd: " + (activeTrip.timeStart || "");
}

function withPhoto(callback){
  const file = photo.files[0];

  if(!file){
    callback("");
    return;
  }

  const reader = new FileReader();
  reader.onload = function(){
    callback(reader.result);
  };
  reader.readAsDataURL(file);
}

function buildTripObject(photoData, startFromActive){
  const d = date.value || today();
  const p = normalizePlate(startFromActive ? activeTrip.plate : plate.value);
  const fromVal = normalizeLocation(startFromActive ? activeTrip.from : from.value);
  const toVal = normalizeLocation(to.value);
  const ts = startFromActive ? activeTrip.timeStart : timeStart.value;
  const te = timeEnd.value;
  const km = calcKM(fromVal, toVal);
  const odo = odometer.value.trim();
  const workHours = timeDiffHours(workStart.value, workEnd.value);

  return {
    date: d,
    timeStart: ts,
    timeEnd: te,
    from: fromVal,
    to: toVal,
    plate: p,
    km: km,
    odometer: odo,
    photo: photoData,
    workStart: workStart.value || "",
    workEnd: workEnd.value || "",
    workHours: workHours.toFixed(2)
  };
}

function validateTrip(trip){
  if(!trip.from || !trip.to || !trip.plate || !trip.timeStart || !trip.timeEnd){
    alert("Vul datum, starttijd, eindtijd, van, naar en kenteken in.");
    return false;
  }

  if(isMandatoryOdoPlate(trip.plate) && !trip.odometer){
    alert("Voor dit kenteken is km-stand na rit verplicht.");
    return false;
  }

  return true;
}

function saveTrip(){
  withPhoto(function(photoData){
    const trip = buildTripObject(photoData, false);

    if(!validateTrip(trip)) return;

    savePlate(trip.plate);
    trips.unshift(trip);

    localStorage.setItem("trips_v2", JSON.stringify(trips));
    renderTrips();
    clearForm();
  });
}

function startTrip(){
  const p = normalizePlate(plate.value);

  if(!from.value || !p || !timeStart.value){
    alert("Vul bij Start rit minimaal Van, Kenteken en Starttijd rit in.");
    return;
  }

  savePlate(p);

  activeTrip = {
    date: date.value || today(),
    timeStart: timeStart.value,
    from: normalizeLocation(from.value),
    plate: p
  };

  localStorage.setItem("activeTrip_v2", JSON.stringify(activeTrip));
  renderActive();
}

function stopTrip(){
  if(!activeTrip){
    alert("Er is nog geen actieve rit gestart.");
    return;
  }

  withPhoto(function(photoData){
    const trip = buildTripObject(photoData, true);

    if(!validateTrip(trip)) return;

    savePlate(trip.plate);
    trips.unshift(trip);

    localStorage.setItem("trips_v2", JSON.stringify(trips));

    localStorage.removeItem("activeTrip_v2");
    activeTrip = null;

    renderTrips();
    renderActive();

    // handig voor volgende rit
    from.value = trip.to;
    to.value = "";
    plate.value = trip.plate;
    timeStart.value = trip.timeEnd || now();
    timeEnd.value = trip.timeEnd || now();
    odometer.value = "";
    photo.value = "";
    lookupPlate();
  });
}

function exportCSV(){
  let csv = "Datum;Starttijd;Eindtijd;Van;Naar;Kenteken;Km route;Km-stand;Aanwezig vanaf;Klaar om;Gewerkte uren dag\n";

  trips.forEach(t => {
    csv += [
      t.date || "",
      t.timeStart || "",
      t.timeEnd || "",
      t.from || "",
      t.to || "",
      t.plate || "",
      t.km || "",
      t.odometer || "",
      t.workStart || "",
      t.workEnd || "",
      t.workHours || ""
    ].join(";") + "\n";
  });

  const blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "ritten.csv";
  a.click();
}

function wipe(){
  if(confirm("Alles wissen?")){
    trips = [];
    localStorage.removeItem("trips_v2");
    renderTrips();
  }
}

function clearForm(){
  const d = date.value || today();
  date.value = d;
  timeStart.value = now();
  timeEnd.value = now();
  from.value = "";
  to.value = "";
  odometer.value = "";
  photo.value = "";
  rdw.innerText = "";
}

setDefaults();
renderTrips();
renderPlates();
renderActive();
updateOdoRequirement();
</script>

</body>
</html>
