<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ritten Breeland</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
margin:0;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
}

input{
background:#eaffea;
padding:8px;
margin-bottom:6px;
border-radius:6px;
border:1px solid #ccd;
width:100%;
}

button{
padding:10px;
margin:4px;
}

.primary{
background:black;
color:white;
}

.start{
background:#28a745;
color:white;
}

.stop{
background:#d9534f;
color:white;
}

.voice{
background:#007bff;
color:white;
}

.quick button{
font-size:13px;
}

.plates button{
font-size:12px;
background:#f2f2f2;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

td,th{
border-bottom:1px solid #ddd;
padding:8px;
}

.active{
background:#eef5ff;
padding:10px;
margin-top:10px;
}

.kmtotal{
background:#f0f4ff;
padding:8px;
margin-bottom:10px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>Rittenadministratie</h2>

<div id="kmToday" class="kmtotal"></div>

<label>Datum</label>
<input type="date" id="date">

<label>Tijd</label>
<input type="time" id="time">

<label>Van</label>
<input id="from">

<div class="quick">

<button onclick="setFrom('Breeland Rdam')">Breeland R'dam</button>
<button onclick="setFrom('Wasstraat')">Wasstraat</button>
<button onclick="setFrom('ABS den Elzen')">ABS den Elzen</button>
<button onclick="setFrom('Breeland Dordrecht')">Breeland Dordrecht</button>
<button onclick="setFrom('Breeland Den Haag')">Breeland Den Haag</button>
<button onclick="setFrom('Breeland Brielle')">Breeland Brielle</button>

</div>

<label>Naar</label>
<input id="to">

<button onclick="swapRoute()">Retour</button>

<label>Spraak invoer</label>

<button class="voice" onclick="startVoice()">🎤 Spreek route</button>

<label>Kenteken</label>
<input id="plate">

<div class="plates" id="plateList"></div>

<div id="rdw"></div>

<br>

<button class="primary" onclick="saveTrip()">Opslaan</button>
<button class="start" onclick="startTrip()">Start rit</button>
<button class="stop" onclick="stopTrip()">Stop rit</button>
<button onclick="clearForm()">Leegmaken</button>

<div id="activeTrip" class="active" style="display:none"></div>

<h3>Ritten</h3>

<table>

<thead>
<tr>
<th>Datum</th>
<th>Tijd</th>
<th>Van</th>
<th>Naar</th>
<th>Kenteken</th>
<th>Km</th>
</tr>
</thead>

<tbody id="tripTable"></tbody>

</table>

<button onclick="exportCSV()">Export CSV</button>
<button onclick="wipe()">Alles wissen</button>

</div>

<script>

const locations={
"breeland":[51.9225,4.47917],
"wasstraat":[51.9150,4.4800],
"abs":[51.8765,4.3580],
"dordrecht":[51.8133,4.6901],
"den haag":[52.0705,4.3007],
"brielle":[51.9033,4.1625]
}

function normalizeLocation(text){

text=text.toLowerCase()

if(text.includes("breeland")) return "breeland"
if(text.includes("wasstraat")) return "wasstraat"
if(text.includes("abs")) return "abs"
if(text.includes("dordrecht")) return "dordrecht"
if(text.includes("den haag")) return "den haag"
if(text.includes("brielle")) return "brielle"

return text

}

function startVoice(){

const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition

if(!SpeechRecognition){
alert("Spraak niet ondersteund")
return
}

let rec=new SpeechRecognition()

rec.lang="nl-NL"

rec.start()

rec.onresult=function(e){

let text=e.results[0][0].transcript.toLowerCase()

if(text.includes("naar")){

let parts=text.split("naar")

let from=normalizeLocation(parts[0])
let to=normalizeLocation(parts[1])

document.getElementById("from").value=from
document.getElementById("to").value=to

}

}

}

let trips=JSON.parse(localStorage.getItem("trips")||"[]")
let activeTrip=JSON.parse(localStorage.getItem("activeTrip")||"null")

let plates=JSON.parse(localStorage.getItem("plates")||"[]")

function renderPlates(){

plateList.innerHTML=""

plates.slice(0,8).forEach(p=>{

let b=document.createElement("button")

b.innerText=p

b.onclick=function(){
plate.value=p
lookupPlate()
}

plateList.appendChild(b)

})

}

function savePlate(p){

if(!plates.includes(p)){

plates.unshift(p)

localStorage.setItem("plates",JSON.stringify(plates))

renderPlates()

}

}

function pad(n){return String(n).padStart(2,"0")}

function today(){
let d=new Date()
return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())
}

function now(){
let d=new Date()
return pad(d.getHours())+":"+pad(d.getMinutes())
}

date.value=today()
time.value=now()

function setFrom(v){from.value=v}

function swapRoute(){

let f=from.value
let t=to.value

from.value=t
to.value=f

}

function calcKM(from,to){

from=normalizeLocation(from)
to=normalizeLocation(to)

if(!locations[from]||!locations[to]) return 0

let [lat1,lon1]=locations[from]
let [lat2,lon2]=locations[to]

const R=6371

let dLat=(lat2-lat1)*Math.PI/180
let dLon=(lon2-lon1)*Math.PI/180

let a=Math.sin(dLat/2)*Math.sin(dLat/2)+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)*Math.sin(dLon/2)

let c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))

return Math.round(R*c)

}

async function lookupPlate(){

let p=plate.value.toUpperCase()

if(!p)return

savePlate(p)

let url="https://opendata.rdw.nl/resource/m9d7-ebf2.json?kenteken="+p

let r=await fetch(url)
let d=await r.json()

if(d.length){

rdw.innerText=d[0].merk+" "+d[0].handelsbenaming

}

}

plate.addEventListener("input",lookupPlate)

function renderTrips(){

tripTable.innerHTML=""

let todayKM=0

trips.forEach(t=>{

if(t.date===today()) todayKM+=t.km||0

let row=document.createElement("tr")

row.innerHTML=`
<td>${t.date}</td>
<td>${t.time}</td>
<td>${t.from}</td>
<td>${t.to}</td>
<td>${t.plate}</td>
<td>${t.km}</td>
`

tripTable.appendChild(row)

})

kmToday.innerText="Vandaag gereden: "+todayKM+" km"

localStorage.setItem("trips",JSON.stringify(trips))

}

function saveTrip(){

let km=calcKM(from.value,to.value)

let p=plate.value.toUpperCase()

savePlate(p)

trips.unshift({
date:date.value,
time:time.value,
from:from.value,
to:to.value,
plate:p,
km:km
})

renderTrips()

}

function startTrip(){

activeTrip={
date:date.value,
time:time.value,
from:from.value,
plate:plate.value
}

localStorage.setItem("activeTrip",JSON.stringify(activeTrip))

renderActive()

}

function stopTrip(){

if(!activeTrip)return

let km=calcKM(activeTrip.from,to.value)

let p=activeTrip.plate.toUpperCase()

savePlate(p)

trips.unshift({
date:activeTrip.date,
time:activeTrip.time,
from:activeTrip.from,
to:to.value,
plate:p,
km:km
})

localStorage.removeItem("activeTrip")

activeTrip=null

renderTrips()
renderActive()

}

function renderActive(){

if(!activeTrip){
activeTripBox.style.display="none"
return
}

activeTripBox.style.display="block"
activeTripBox.innerHTML="Actieve rit: "+activeTrip.from+" → ... ("+activeTrip.plate+")"

}

function exportCSV(){

let csv="Datum;Tijd;Van;Naar;Kenteken;Km\n"

trips.forEach(t=>{
csv+=`${t.date};${t.time};${t.from};${t.to};${t.plate};${t.km}\n`
})

let blob=new Blob([csv])
let url=URL.createObjectURL(blob)

let a=document.createElement("a")
a.href=url
a.download="ritten.csv"
a.click()

}

function wipe(){

if(confirm("Alles wissen?")){

trips=[]
localStorage.removeItem("trips")

renderTrips()

}

}

function clearForm(){

date.value=today()
time.value=now()

from.value=""
to.value=""

}

renderTrips()
renderActive()
renderPlates()

</script>

</body>
</html>
